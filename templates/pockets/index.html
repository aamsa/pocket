{% extends "base.html" %}

{% block title %}Pockets · {{ APP_NAME }}{% endblock %}

{% block content %}
  <div class="flex items-end justify-between mb-5">
    <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-brand-900">Pockets</h1>
    <button class="btn-primary" disabled title="Phase 3">
      <i data-lucide="plus" class="icon"></i> New pocket
    </button>
  </div>
  <div class="card p-10 text-center text-sm text-brand-500">
    <i data-lucide="wallet" class="w-10 h-10 mx-auto mb-2 stroke-[1.5] text-brand-300"></i>
    <p>Pocket tree shows up here once Phase 3 lands.</p>
  </div>
{% endblock %}
