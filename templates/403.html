{% extends "base.html" %}

{% block title %}Not allowed · {{ APP_NAME }}{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto card p-10 text-center">
    <div class="mx-auto w-14 h-14 rounded-2xl bg-expense/10 text-expense grid place-items-center mb-4">
      <i data-lucide="shield-x" class="w-7 h-7 stroke-[1.75]"></i>
    </div>
    <h1 class="text-xl font-semibold text-brand-900">You don't have access</h1>
    <p class="text-sm text-brand-600 mt-2">This pocket isn't shared with you, or your permission is view-only.</p>
    <a href="{% url 'core:dashboard' %}" class="btn-primary mt-6">
      <i data-lucide="arrow-left" class="icon"></i> Back to dashboard
    </a>
  </div>
{% endblock %}
