{% with path=request.path %}
<nav class="md:hidden fixed bottom-0 inset-x-0 z-30 bg-brand-50/95 backdrop-blur border-t border-brand-100 tab-bar">
  <div class="grid grid-cols-5 max-w-md mx-auto">
    <a href="{% url 'core:dashboard' %}"
       class="flex flex-col items-center gap-0.5 py-2 text-[11px]
              {% if path == '/' %}text-brand-900{% else %}text-brand-500{% endif %}">
      <i data-lucide="layout-dashboard" class="icon"></i>
      <span>Home</span>
    </a>
    <a href="{% url 'pockets:index' %}"
       class="flex flex-col items-center gap-0.5 py-2 text-[11px]
              {% if '/pockets' in path %}text-brand-900{% else %}text-brand-500{% endif %}">
      <i data-lucide="wallet" class="icon"></i>
      <span>Pockets</span>
    </a>
    <span aria-hidden="true"></span>
    <a href="{% url 'reports:index' %}"
       class="flex flex-col items-center gap-0.5 py-2 text-[11px]
              {% if '/reports' in path %}text-brand-900{% else %}text-brand-500{% endif %}">
      <i data-lucide="chart-pie" class="icon"></i>
      <span>Reports</span>
    </a>
    <a href="{% url 'accounts:profile' %}"
       class="relative flex flex-col items-center gap-0.5 py-2 text-[11px]
              {% if '/accounts/settings' in path %}text-brand-900{% else %}text-brand-500{% endif %}">
      <i data-lucide="user" class="icon"></i>
      <span>More</span>
      {% if GLOBAL_PENDING_INVITES %}
        <span class="absolute top-1 right-[calc(50%-1.25rem)] w-4 h-4 rounded-full bg-brand-700 text-brand-50 text-[10px] font-semibold grid place-items-center" aria-label="{{ GLOBAL_PENDING_INVITES }} pending invites">{{ GLOBAL_PENDING_INVITES }}</span>
      {% endif %}
    </a>
  </div>
</nav>
{% endwith %}
